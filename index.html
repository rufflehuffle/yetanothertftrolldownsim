<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/fonts.css">
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/board.css">
    <link rel="stylesheet" href="style/shop.css">
    <link rel="stylesheet" href="style/hud.css">
    <link rel="stylesheet" href="style/buttons.css">
    <link rel="stylesheet" href="style/team-builder.css">
    <link rel="stylesheet" href="style/presets.css">
    <link rel="stylesheet" href="style/timer.css">
    <link rel="stylesheet" href="style/rolldown.css">
    <link rel="stylesheet" href="style/trait.css">
    <link rel="stylesheet" href="style/planner.css">
    <title>42roll.it</title>
</head>
<body>
    <!-- Top Round Timer Bar -->
    <div class="top-timer-bar">
        <div class="top-timer-controls">
            <div class="top-timer-progress-track">
                <div class="top-timer-progress-fill"></div>
            </div>
            <div class="timer-input-container">
                <input class="timer-input" type="number" value="30" min="1" max="999" title="Set duration (seconds)">
                <span class="timer-value" style="display:none;">30</span>
            </div>
        </div>
    </div>

    <!-- Trait Panel (left side) -->
    <div class="trait-panel"></div>
    <!-- Floating tooltip for trait hover -->
    <div class="trait-tooltip" style="display:none;"></div>

    <div class="hud">
        <div class="level-panel">
            <div class="level-xp-row">
                <div class="level-dropdown">
                    <div class="level-display">Lvl 8</div>
                    <div class="level-dropdown-menu">
                        <div class="level-option" data-value="2">2</div>
                        <div class="level-option" data-value="3">3</div>
                        <div class="level-option" data-value="4">4</div>
                        <div class="level-option" data-value="5">5</div>
                        <div class="level-option" data-value="6">6</div>
                        <div class="level-option" data-value="7">7</div>
                        <div class="level-option" data-value="8">8</div>
                        <div class="level-option" data-value="9">9</div>
                        <div class="level-option" data-value="10">10</div>
                    </div>
                </div>
                <span class="xp-bar-text">0 / 68</span>
            </div>
            <div class="xp-bar">
                <div class="xp-bar-fill"></div>
            </div>
            <button class="buy-xp-button">
                <span class="hud-btn-left">
                    <span class="hud-btn-label">Buy XP</span>
                    <span class="hud-btn-cost buy-xp-cost">4</span>
                </span>
                <span class="hud-btn-right">
                    <img src="img/xp.png" class="hud-btn-icon" alt="">
                </span>
            </button>
            <button class="roll-button">
                <span class="hud-btn-left">
                    <span class="hud-btn-label">Reroll</span>
                    <span class="hud-btn-cost roll-cost">2</span>
                </span>
                <span class="hud-btn-right">
                    <img src="img/reroll.png" class="hud-btn-icon" alt="">
                </span>
            </button>
        </div>

        <div class="shop-container">
            <div class="above-shop-container">
                <div class="odds-container">
                    <div class="odd cost-1-odds">• 100%</div>
                    <div class="odd cost-2-odds">● 100%</div>
                    <div class="odd cost-3-odds">▲ 100%</div>
                    <div class="odd cost-4-odds">◆ 100%</div>
                    <div class="odd cost-5-odds">⬟ 100%</div>
                </div>
                <div class="gold-container">
                    <div class="gold">50</div>
                </div>
            </div>
            <div class="shop">
                <div class="shop-slot shop-slot-1">
                    <div class="shop-slot-clip">
                        <img class="champ-img" src="" alt="" draggable="false">
                        <div class="shop-slot-bar"><span class="shop-slot-name"></span><span class="shop-slot-cost"></span></div>
                    </div>
                    <div class="shop-star-indicator"></div>
                </div>
                <div class="shop-slot shop-slot-2">
                    <div class="shop-slot-clip">
                        <img class="champ-img" src="" alt="" draggable="false">
                        <div class="shop-slot-bar"><span class="shop-slot-name"></span><span class="shop-slot-cost"></span></div>
                    </div>
                    <div class="shop-star-indicator"></div>
                </div>
                <div class="shop-slot shop-slot-3">
                    <div class="shop-slot-clip">
                        <img class="champ-img" src="" alt="" draggable="false">
                        <div class="shop-slot-bar"><span class="shop-slot-name"></span><span class="shop-slot-cost"></span></div>
                    </div>
                    <div class="shop-star-indicator"></div>
                </div>
                <div class="shop-slot shop-slot-4">
                    <div class="shop-slot-clip">
                        <img class="champ-img" src="" alt="" draggable="false">
                        <div class="shop-slot-bar"><span class="shop-slot-name"></span><span class="shop-slot-cost"></span></div>
                    </div>
                    <div class="shop-star-indicator"></div>
                </div>
                <div class="shop-slot shop-slot-5">
                    <div class="shop-slot-clip">
                        <img class="champ-img" src="" alt="" draggable="false">
                        <div class="shop-slot-bar"><span class="shop-slot-name"></span><span class="shop-slot-cost"></span></div>
                    </div>
                    <div class="shop-star-indicator"></div>
                </div>
                <!-- Planning overlay: shown over shop in planning + roundEnd modes -->
                <div class="rd-shop-overlay">
                    <div class="rd-shop-overlay__content">
                        <div class="rd-shop-overlay__hint"></div>
                        <div class="rd-shop-overlay__preset-name"></div>
                        <button class="rd-shop-overlay__primary-btn"></button>
                        <div class="rd-shop-overlay__secondary-actions">
                            <button class="rd-overlay-tb-btn">Team Builder</button>
                            <button class="rd-overlay-presets-btn">Presets</button>
                            <button class="rd-overlay-freeroll-btn">Free Roll</button>
                            <button class="rd-overlay-roundend-freeroll-btn">Free Roll</button>
                            <button class="rd-overlay-generate-btn">Generate Board</button>
                        </div>
                    </div>
                </div>
                <!-- Pause overlay: shown over shop when round is paused -->
                <div class="rd-pause-overlay">
                    <div class="rd-pause-overlay__content">
                        <div class="rd-pause-overlay__label">Round Paused</div>
                        <button class="rd-pause-overlay__end-btn">End Round</button>
                        <button class="rd-pause-overlay__reset-btn">Reset to Preset</button>
                        <button class="rd-pause-overlay__freeroll-btn">Free Roll Mode</button>
                    </div>
                </div>
                <!-- Sell zone: absolutely positioned to fill the shop -->
                <div class="sell-zone">Sell</div>
            </div>
        </div>
    </div>

    <button class="team-planner-button">Team Planner</button>
    <button class="team-builder-button">Team Builder</button>
    <button class="rolldown-mode-button" style="display:none;">▶ Rolldown</button>
    <button class="presets-button">Presets</button>

    <!-- Team Builder Unit Picker (right side panel) -->
    <div class="tb-picker-panel" style="display:none;">
        <div class="tb-picker-header">
            <span class="tb-picker-title">Add Units</span>
        </div>
        <div class="tb-picker-inner"></div>
    </div>

    <!-- Save Preset Modal -->
    <div class="save-preset-backdrop" style="display:none;">
        <div class="save-preset-modal">
            <div class="save-preset-header">
                <span class="save-preset-title">Save Board as Preset</span>
                <button class="save-preset-close">✕</button>
            </div>
            <div class="save-preset-body">
                <label class="save-preset-label">Preset Name</label>
                <input class="save-preset-input" type="text" placeholder="e.g. Mage Reroll 8">
                <div class="save-preset-actions">
                    <button class="save-preset-confirm">Save</button>
                    <button class="save-preset-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Presets List Modal -->
    <div class="presets-backdrop" style="display:none;">
        <div class="presets-modal">
            <div class="presets-header">
                <span class="presets-title">Presets</span>
                <button class="presets-close">✕</button>
            </div>
            <div class="presets-list"></div>
        </div>
    </div>

    <!-- Team Planner backdrop -->
    <div class="planner-backdrop"></div>

    <!-- Team Planner -->
    <div class="planner">

        <div class="planner__header">
            <div class="planner__saved-teams-btn">&lt; &lt;</div>
            <div class="planner__title">TEAM PLANNER</div>
            <div class="planner__close-btn">×</div>
        </div>

        <div class="planner-picker">
            <div class="planner-picker__filter-container">
                <div class="planner-picker__filter-btn">Filter</div>
                <label class="planner-picker__unlockable-switch">
                    <input type="checkbox">
                    <div class="planner-picker__unlockable-switch-slider"></div>
                    <div class="planner-picker__unlockable-switch-icon">
                        <img class="planner-picker__unlockable-switch-symbol" src="img/lock.png">
                    </div>
                </label>
            </div>
            <!-- Cost groups are injected here by team-planner.js -->
        </div>

        <div class="planner-selected">

            <div class="planner-traits">
                <!-- Trait rows injected by team-planner.js -->
            </div>

            <div class="planner-selected__header">
                <div class="planner-selected__title">Your Team</div>
                <div class="planner-selected__generate-btn">GENERATE</div>
                <div class="planner-selected__set-target-btn">SET AS TARGET</div>
                <div class="planner-selected__paste-btn">PASTE TEAM</div>
            </div>

            <div class="planner-selected__team">
                <!-- Unit slots injected by team-planner.js -->
            </div>

            <div class="planner-selected__actions">
                <div class="planner-selected__clear-btn">CLEAR</div>
                <div class="planner-selected__snapshot-btn">SNAPSHOT</div>
                <div class="planner-selected__undo-btn">UNDO</div>
            </div>

        </div>

    </div>

    <div class="bench">
        <div class="hex-wrapper"><div class="bench-slot bench-slot-1"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-2"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-3"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-4"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-5"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-6"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-7"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-8"></div><div class="star-indicator"></div></div>
        <div class="hex-wrapper"><div class="bench-slot bench-slot-9"></div><div class="star-indicator"></div></div>
    </div>

    <div class="board-count">0/8</div>
    <div class="board">
        <div class="board-row">
            <div class="hex-wrapper"><div class="hex A1"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A2"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A3"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A4"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A5"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A6"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex A7"></div><div class="star-indicator"></div></div>
        </div>
        <div class="board-row offset">
            <div class="hex-wrapper"><div class="hex B1"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B2"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B3"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B4"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B5"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B6"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex B7"></div><div class="star-indicator"></div></div>
        </div>
        <div class="board-row">
            <div class="hex-wrapper"><div class="hex C1"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C2"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C3"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C4"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C5"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C6"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex C7"></div><div class="star-indicator"></div></div>
        </div>
        <div class="board-row offset">
            <div class="hex-wrapper"><div class="hex D1"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D2"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D3"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D4"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D5"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D6"></div><div class="star-indicator"></div></div>
            <div class="hex-wrapper"><div class="hex D7"></div><div class="star-indicator"></div></div>
        </div>
    </div>


    <script type="module" src="js/main.js"></script>
</body>
</html>
