<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Rolldown Modal — Prototype</title>
    <link rel="stylesheet" href="style/fonts.css">
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/postrd.css">
</head>
<body>

    <!-- Trigger button (prototype only) -->
    <button id="open-postrd" style="
        position: fixed; top: 20px; left: 20px;
        font-family: 'Beaufort', serif; font-size: 13px; font-weight: 700;
        color: #C8AA6E; background: #0D1416; border: 2px solid #947842;
        padding: 6px 16px; cursor: pointer; letter-spacing: 0.5px;
    ">Open Post-RD Modal</button>

    <!-- ============================================================
         Post-Rolldown Modal
         ============================================================ -->
    <div class="postrd" id="postrd" role="dialog" aria-modal="true" aria-label="Post-Rolldown Review">

        <div class="postrd__backdrop" id="postrd-backdrop"></div>

        <div class="postrd__panel">

            <!-- Header: tabs + close -->
            <header class="postrd__header">
                <nav class="postrd__tabs" role="tablist">
                    <button class="postrd__tab postrd__tab--active"
                            role="tab"
                            data-tab="performance"
                            aria-selected="true"
                            aria-controls="postrd-performance">
                        Performance
                    </button>
                    <button class="postrd__tab"
                            role="tab"
                            data-tab="analysis"
                            aria-selected="false"
                            aria-controls="postrd-analysis">
                        Analysis
                    </button>
                </nav>
                <button class="postrd__close" id="postrd-close" aria-label="Close">&times;</button>
            </header>

            <!-- Body: tab panels -->
            <div class="postrd__body">

                <!-- ── Performance tab (default) ── -->
                <div class="postrd-performance postrd__panel-content postrd__panel-content--active"
                     id="postrd-performance"
                     role="tabpanel"
                     aria-labelledby="tab-performance">

                    <div class="postrd-performance__grade">
                        <!-- Overall letter grade + sub-scores -->
                        <span class="postrd-performance__grade-label">Grade</span>
                        <span class="postrd-performance__grade-value">A</span>
                    </div>

                    <div class="postrd-performance__comp">
                        <!-- Comp / board state at end of rolldown -->
                        <span class="postrd-performance__section-title">Final Board</span>
                        <div class="postrd-comp__units">
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--1-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_illaoi.png" alt="Illaoi">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--2-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_graves.png" alt="Graves">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--2-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_twistedfate.png" alt="Twisted Fate">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--3-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_gangplank.png" alt="Gangplank">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--3-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_nautilus.png" alt="Nautilus">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--4-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_fizz.png" alt="Fizz">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--4-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_missfortune.png" alt="Miss Fortune">
                            </div>
                            <div class="postrd-comp__unit-slot postrd-comp__unit-slot--5-cost">
                                <img class="postrd-comp__unit-icon" src="https://cdn.metatft.com/file/metatft/champions/tft16_tahmkench.png" alt="Tahm Kench">
                            </div>
                        </div>
                    </div>

                    <div class="postrd-pentascore">
                        <!-- Pentagon radar chart: Speed, Discipline, Accuracy, Positioning, Flexibility -->
                        <span class="postrd-performance__section-title">Score Breakdown</span>
                        <!--
                            Pentagon geometry — viewBox 320×270, center (160,145), outer radius 90
                            Axis order (clockwise from top):
                              0 Speed      −90°  →  (160, 55)
                              1 Discipline  −18°  →  (245.6, 117.2)
                              2 Accuracy    54°   →  (212.9, 217.8)
                              3 Positioning 126°  →  (107.1, 217.8)
                              4 Flexibility 198°  →  (74.4, 117.2)
                            Grade rings: S r=90 | A r=67.5 | B r=45 | C r=22.5
                            Demo scores:  S  A  A  B  C
                        -->
                        <svg class="postrd-pentascore__svg"
                             viewBox="0 0 320 258"
                             xmlns="http://www.w3.org/2000/svg"
                             aria-label="Score breakdown pentagon">

                            <defs>
                                <filter id="penta-glow" x="-40%" y="-40%" width="180%" height="180%">
                                    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
                                    <feMerge>
                                        <feMergeNode in="blur"/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                            </defs>

                            <!-- Dark fill for the chart background -->
                            <polygon points="160,55 245.6,117.2 212.9,217.8 107.1,217.8 74.4,117.2"
                                     fill="#060a0c"/>

                            <!-- Spokes (center → each outer vertex) -->
                            <line x1="160" y1="145" x2="160"   y2="55"    stroke="#1a2e34" stroke-width="1"/>
                            <line x1="160" y1="145" x2="245.6" y2="117.2" stroke="#1a2e34" stroke-width="1"/>
                            <line x1="160" y1="145" x2="212.9" y2="217.8" stroke="#1a2e34" stroke-width="1"/>
                            <line x1="160" y1="145" x2="107.1" y2="217.8" stroke="#1a2e34" stroke-width="1"/>
                            <line x1="160" y1="145" x2="74.4"  y2="117.2" stroke="#1a2e34" stroke-width="1"/>

                            <!-- Grade rings (C innermost → S outermost) -->
                            <!-- C ring  r=22.5 -->
                            <polygon points="160,122.5 181.4,138 173.2,163.2 146.8,163.2 138.6,138"
                                     fill="none" stroke="#1a2e34" stroke-width="1"/>
                            <!-- B ring  r=45 -->
                            <polygon points="160,100 202.8,131.1 186.5,181.4 133.5,181.4 117.2,131.1"
                                     fill="none" stroke="#1a2e34" stroke-width="1"/>
                            <!-- A ring  r=67.5 -->
                            <polygon points="160,77.5 224.2,124.1 199.7,199.6 120.3,199.6 95.8,124.1"
                                     fill="none" stroke="#1a2e34" stroke-width="1"/>
                            <!-- S ring  r=90  (outer border — slightly brighter) -->
                            <polygon points="160,55 245.6,117.2 212.9,217.8 107.1,217.8 74.4,117.2"
                                     fill="none" stroke="#253e47" stroke-width="1.5"/>

                            <!-- Grade tick labels (right side of top spoke) -->
                            <text x="168" y="58"  fill="#3d5560" font-size="9" font-family="Beaufort,serif" font-weight="700">S</text>
                            <text x="168" y="80"  fill="#3d5560" font-size="9" font-family="Beaufort,serif" font-weight="700">A</text>
                            <text x="168" y="103" fill="#3d5560" font-size="9" font-family="Beaufort,serif" font-weight="700">B</text>
                            <text x="168" y="125" fill="#3d5560" font-size="9" font-family="Beaufort,serif" font-weight="700">C</text>

                            <!-- Score polygon
                                 Speed=S(90)→(160,55)  Discipline=A(67.5)→(224.2,124.1)
                                 Accuracy=A(67.5)→(199.7,199.6)  Positioning=B(45)→(133.5,181.4)
                                 Flexibility=C(22.5)→(138.6,138) -->
                            <polygon points="160,55 224.2,124.1 199.7,199.6 133.5,181.4 138.6,138"
                                     fill="rgba(42,130,156,0.22)"
                                     stroke="#42829C"
                                     stroke-width="1.5"
                                     stroke-linejoin="round"
                                     filter="url(#penta-glow)"/>

                            <!-- Score vertex dots -->
                            <circle cx="160"   cy="55"    r="3" fill="#42829C"/>
                            <circle cx="224.2" cy="124.1" r="3" fill="#42829C"/>
                            <circle cx="199.7" cy="199.6" r="3" fill="#42829C"/>
                            <circle cx="133.5" cy="181.4" r="3" fill="#42829C"/>
                            <circle cx="138.6" cy="138"   r="3" fill="#42829C"/>

                            <!-- Axis labels + per-axis grade (all above their metric name)
                                 Discipline/Flexibility grades are centered over their label text:
                                   "DISCIPLINE" ~88px wide → center offset +44 from x=252 → x≈296
                                   "FLEXIBILITY" ~91px wide → center offset −46 from x=68  → x≈22 -->

                            <!-- Speed — grade above label -->
                            <text x="160"  y="30"  text-anchor="middle" fill="#C8AA6E" font-size="16" font-family="Beaufort,serif" font-weight="900">S</text>
                            <text x="160"  y="46"  text-anchor="middle" fill="#A09B8C" font-size="11" font-family="Beaufort,serif" font-weight="700" letter-spacing="0.6">SPEED</text>

                            <!-- Discipline — grade centered above label -->
                            <text x="287"  y="105" text-anchor="middle" fill="#C8AA6E" font-size="16" font-family="Beaufort,serif" font-weight="900">A</text>
                            <text x="252"  y="120" text-anchor="start"  fill="#A09B8C" font-size="11" font-family="Beaufort,serif" font-weight="700" letter-spacing="0.6">DISCIPLINE</text>

                            <!-- Accuracy — grade above label -->
                            <text x="220"  y="232" text-anchor="middle" fill="#C8AA6E" font-size="16" font-family="Beaufort,serif" font-weight="900">A</text>
                            <text x="220"  y="247" text-anchor="middle" fill="#A09B8C" font-size="11" font-family="Beaufort,serif" font-weight="700" letter-spacing="0.6">ACCURACY</text>

                            <!-- Positioning — grade above label -->
                            <text x="100"  y="232" text-anchor="middle" fill="#C8AA6E" font-size="16" font-family="Beaufort,serif" font-weight="900">B</text>
                            <text x="100"  y="247" text-anchor="middle" fill="#A09B8C" font-size="11" font-family="Beaufort,serif" font-weight="700" letter-spacing="0.6">POSITIONING</text>

                            <!-- Flexibility — grade centered above label -->
                            <text x="33"   y="105" text-anchor="middle" fill="#C8AA6E" font-size="16" font-family="Beaufort,serif" font-weight="900">C</text>
                            <text x="68"   y="120" text-anchor="end"    fill="#A09B8C" font-size="11" font-family="Beaufort,serif" font-weight="700" letter-spacing="0.6">FLEXIBILITY</text>

                        </svg>
                    </div>

                    <div class="postrd-performance__history">
                        <!-- Score history graph across past rolldowns -->
                        <span class="postrd-performance__section-title">Score History</span>
                        <div class="postrd-performance__history-chart">
                            <svg id="score-history-svg"
                                 class="postrd-history__svg"
                                 viewBox="0 0 320 130"
                                 xmlns="http://www.w3.org/2000/svg"
                                 aria-label="Score history chart"></svg>
                        </div>
                    </div>

                </div>

                <!-- ── Analysis tab ── -->
                <div class="postrd-analysis postrd__panel-content"
                     id="postrd-analysis"
                     role="tabpanel"
                     aria-labelledby="tab-analysis"
                     hidden>

                    <span class="postrd-performance__section-title">Round Detail</span>
                    <!-- Per-roll breakdown goes here -->

                </div>

            </div><!-- /.postrd__body -->

        </div><!-- /.postrd__panel -->

    </div><!-- /.postrd -->

    <script>
        const modal    = document.getElementById('postrd');
        const backdrop = document.getElementById('postrd-backdrop');
        const closeBtn = document.getElementById('postrd-close');
        const openBtn  = document.getElementById('open-postrd');
        const tabs     = modal.querySelectorAll('.postrd__tab');
        const panels   = modal.querySelectorAll('.postrd__panel-content');

        function openModal() { modal.classList.add('postrd--open'); }
        function closeModal() { modal.classList.remove('postrd--open'); }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;

                tabs.forEach(t => {
                    t.classList.toggle('postrd__tab--active', t === tab);
                    t.setAttribute('aria-selected', t === tab ? 'true' : 'false');
                });

                panels.forEach(panel => {
                    const isActive = panel.id === `postrd-${target}`;
                    panel.classList.toggle('postrd__panel-content--active', isActive);
                    panel.hidden = !isActive;
                });
            });
        });

        // ── Score History Chart ──────────────────────────────────
        (function () {
            const scores = [58, 62, 56, 64, 68, 63, 71, 67, 74, 72,
                            78, 75, 80, 77, 84, 82, 87, 90, 93, 97];

            const svg       = document.getElementById('score-history-svg');
            const container = svg.parentElement;
            const NS = 'http://www.w3.org/2000/svg';
            const n  = scores.length;

            function draw() {
            const W = container.clientWidth;
            const H = container.clientHeight;
            if (!W || !H) return;
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            while (svg.firstChild) svg.removeChild(svg.firstChild);

            const PAD = { l: 26, r: 10, t: 10, b: 10 };
            const pw = W - PAD.l - PAD.r;
            const ph = H - PAD.t - PAD.b;

            // Zoom y-axis to the data range (±5, snapped to nearest 5)
            const rawMin = Math.min(...scores);
            const rawMax = Math.max(...scores);
            const yMin = Math.max(0,   Math.floor((rawMin - 5) / 5) * 5);
            const yMax = Math.min(100, Math.ceil ((rawMax + 5) / 5) * 5);

            function mk(tag, attrs) {
                const el = document.createElementNS(NS, tag);
                for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
                return el;
            }

            function toX(i) { return PAD.l + (i / (n - 1)) * pw; }
            function toY(v) { return PAD.t + (1 - (v - yMin) / (yMax - yMin)) * ph; }

            // Grid lines + Y labels — every 5 units within zoomed range
            for (let v = yMin; v <= yMax; v += 5) {
                const y     = toY(v);
                const isMaj = v % 10 === 0;
                svg.appendChild(mk('line', {
                    x1: PAD.l, x2: W - PAD.r, y1: y, y2: y,
                    stroke: isMaj ? '#1a2e34' : '#111c21',
                    'stroke-width': 1
                }));
                if (isMaj) {
                    const t = mk('text', {
                        x: PAD.l - 4, y: y + 3.5,
                        'text-anchor': 'end', fill: '#3d5560',
                        'font-size': 8, 'font-family': 'Beaufort,serif'
                    });
                    t.textContent = v;
                    svg.appendChild(t);
                }
            }

            // Catmull-Rom → cubic bezier smooth path
            function smoothPath(pts) {
                let d = `M ${pts[0].x},${pts[0].y}`;
                const t = 0.4;
                for (let i = 0; i < pts.length - 1; i++) {
                    const p0 = pts[Math.max(i - 1, 0)];
                    const p1 = pts[i];
                    const p2 = pts[i + 1];
                    const p3 = pts[Math.min(i + 2, pts.length - 1)];
                    const cp1x = p1.x + (p2.x - p0.x) * t;
                    const cp1y = p1.y + (p2.y - p0.y) * t;
                    const cp2x = p2.x - (p3.x - p1.x) * t;
                    const cp2y = p2.y - (p3.y - p1.y) * t;
                    d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
                }
                return d;
            }

            const pts      = scores.map((v, i) => ({ x: toX(i), y: toY(v) }));
            const linePath = smoothPath(pts);

            // Area fill under line
            const areaD = linePath
                + ` L ${toX(n - 1)},${H - PAD.b} L ${toX(0)},${H - PAD.b} Z`;
            svg.appendChild(mk('path', {
                d: areaD,
                fill: 'rgba(42,130,156,0.10)', stroke: 'none'
            }));

            // Smooth line
            svg.appendChild(mk('path', {
                d: linePath,
                fill: 'none',
                stroke: '#42829C',
                'stroke-width': 1.5,
                'stroke-linejoin': 'round'
            }));

            // Dots — latest score highlighted in gold
            pts.forEach((pt, i) => {
                const isLatest = i === n - 1;
                svg.appendChild(mk('circle', {
                    cx: pt.x, cy: pt.y,
                    r: isLatest ? 3.5 : 2.5,
                    fill: isLatest ? '#C8AA6E' : '#42829C'
                }));
            });
            } // end draw()

            new ResizeObserver(draw).observe(container);
        })();

        // Open on load for prototyping convenience
        openModal();
    </script>

</body>
</html>
